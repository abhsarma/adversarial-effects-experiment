<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Decision-making under Uncertainty using Visualizations</title>
    <script src="https://d3js.org/d3.v7.js"></script>
    <!-- Load revisit-communicate to be able to send data to reVISit -->
    <script src="../../revisitUtilities/revisit-communicate.js"></script>
    
  </head>

  <body>
    <h3>Trial number: <span id="task-index"></span>/18</h3>
    <p>Budget Remaining: $<span id="remaining-budget"></span></p>
    <div class="img-container"></div>
  </body>

  <script>
    // Get data from the config file
    Revisit.onDataReceive((data) => {
        d3.select("span#task-index").text(data.index);
        d3.select("span#task-index").text(data.budget);
        // $FLAG: budget is not defined

        d3.select("div.img-container")
            .append("img")
            .attr("src", d => "./img/trial/cdf-t" + data.index + ".jpg")
            .style("width", "100%");


        // const barData = data['barData']
        // const taskID = 'barChart';
        // const loc = 'belowStimulus';
        // height = 400;
        // width = 750;
        // padding = 25;
      
        // d3.select("body").
    });
  </script>

  <style>
    p {
        font-family: sans-serif;
    }
  </style>
</html>
